name: destroy terraform code

on:
  workflow_dispatch:   # Allows manual triggering of the workflow from the GitHub Actions tab
  
jobs:
  destroy:     
    runs-on: ubuntu-latest   # Use the latest Ubuntu runner, creates virtual environment for the job
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v1

      - name: Initialize Terraform
        run:  terraform init

      - name: destroy terraform configuration
        run:  terraform destroy - auto-approve
