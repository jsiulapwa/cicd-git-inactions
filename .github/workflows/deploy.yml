name: deploy terraform code

on:
  workflow_dispatch:   # Allows manual triggering of the workflow from the GitHub Actions tab
    inputs:
      action:
        description: 'Choose an action to perform'
        required: true
        default: 'apply'
        type: choice
        options:
          - apply
          - destroy
jobs:
  deploy:     
    runs-on: ubuntu-latest   # Use the latest Ubuntu runner, creates virtual environment for the job
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v1

      - name: Initialize Terraform
        run: terraform init

      - name: Validate Terraform configuration
        run: terraform validate

      - name: Plan Terraform deployment
        run: terraform plan

      - name: Apply Terraform configuration
        if: ${{ github.event.inputs.action == 'apply' }}
        run: terraform apply -auto-approve

      - name: Destroy Terraform resources
        if: ${{ github.event.inputs.action == 'destroy' }}
        run: terraform destroy -auto-approve
        